name: Publish npm package

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Build, test and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_REGISTRY_URL: ${{ secrets.PRAGMA_NPM_REGISTRY_URL }}
      NODE_AUTH_TOKEN: ${{ secrets.PRAGMA_NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: ${{ env.NPM_REGISTRY_URL }}

      - name: Configure Artifactory credentials
        run: |
          REGISTRY_URL="${NPM_REGISTRY_URL%/}"
          REGISTRY_AUTH="${REGISTRY_URL#http://}"
          REGISTRY_AUTH="${REGISTRY_AUTH#https://}"

          npm config set registry "${REGISTRY_URL}/"
          npm config set "//${REGISTRY_AUTH}/:_authToken" "${NODE_AUTH_TOKEN}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish package
        run: npm publish --registry "${NPM_REGISTRY_URL}"
